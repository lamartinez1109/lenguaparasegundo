<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Taller de Letras · Lengua 2º grado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-decor" aria-hidden="true">
  <span class="floatie f1">✏️</span>
  <span class="floatie f2">📖</span>
  <span class="floatie f3">⭐</span>
  <span class="floatie f4">🖍️</span>
  <span class="floatie f5">✨</span>
</div>

<!-- ===================== PANTALLA: INICIO ===================== -->
<main id="screen-home" class="screen active">
  <header class="home-header">
    <div class="mascot" id="mascotHome" aria-hidden="true">
      <svg viewBox="0 0 120 160" class="mascot-svg">
        <ellipse cx="60" cy="150" rx="34" ry="8" class="mascot-shadow"/>
        <polygon points="60,10 80,40 40,40" class="pencil-tip"/>
        <rect x="40" y="40" width="40" height="90" rx="10" class="pencil-body"/>
        <rect x="40" y="118" width="40" height="14" class="pencil-band"/>
        <circle cx="50" cy="75" r="6" class="eye"/>
        <circle cx="70" cy="75" r="6" class="eye"/>
        <circle cx="51.5" cy="73.5" r="2" class="eye-shine"/>
        <circle cx="71.5" cy="73.5" r="2" class="eye-shine"/>
        <path d="M48 95 Q60 105 72 95" class="mouth"/>
      </svg>
    </div>
    <p class="eyebrow">2º grado · Área de Lengua</p>
    <h1>El Taller de Letras</h1>
    <p class="subtitle">Elegí una estación de trabajo y empezá a practicar.</p>
  </header>

  <section class="shelf" aria-label="Actividades disponibles">
    <article class="activity-card" data-activity="sonidos">
      <div class="card-icon-wrap">
        <span class="card-icon">🪥</span>
      </div>
      <h2>Sonidos compuestos</h2>
      <p>br · bl · pl · pr · cr</p>
      <div class="card-tag">3 niveles</div>
      <button class="btn-enter" data-open="sonidos">Empezar <span class="arrow">→</span></button>
    </article>

    <article class="activity-card" data-activity="adjetivos">
      <div class="card-icon-wrap">
        <span class="card-icon">📝</span>
      </div>
      <h2>Adjetivos calificativos</h2>
      <p>Género y número</p>
      <div class="card-tag">4 niveles</div>
      <button class="btn-enter" data-open="adjetivos">Empezar <span class="arrow">→</span></button>
    </article>

    <article class="activity-card disabled" aria-disabled="true">
      <div class="card-icon-wrap">
        <span class="card-icon">📚</span>
      </div>
      <h2>Próximamente</h2>
      <p>Nueva estación en camino</p>
      <div class="card-tag muted">En preparación</div>
      <button class="btn-enter" disabled>Pronto</button>
    </article>
  </section>
</main>

<script>
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".activity-card[data-activity]").forEach(card => {
    const btn = card.querySelector(".btn-enter");
    const activity = card.dataset.activity;
    btn.addEventListener("click", () => {
      window.location.href = activity + ".html";
    });
  });
});
</script>
</body>
</html>

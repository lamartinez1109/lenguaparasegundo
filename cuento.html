<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Patito Feo · Producción escrita</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
/* ── Estilos propios de la actividad de cuento ── */
.cuento-wrapper {
  max-width: 860px;
  margin: 0 auto;
  padding: 1.5rem 1rem 3rem;
}

.cuento-header {
  text-align: center;
  margin-bottom: 1.8rem;
}
.cuento-header .eyebrow {
  font-family: var(--font-body, "Quicksand", sans-serif);
  font-size: .85rem;
  font-weight: 600;
  color: var(--clr-accent2, #f59e0b);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: .3rem;
}
.cuento-header h1 {
  font-family: var(--font-title, "Baloo 2", cursive);
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  color: var(--clr-primary, #6c63ff);
  margin: 0 0 .4rem;
  line-height: 1.15;
}
.cuento-header .subtitle {
  font-size: .95rem;
  color: #666;
}

/* Datos del alumno */
.alumno-form {
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 4px 18px rgba(108,99,255,.10);
  padding: 1.4rem 1.6rem;
  margin-bottom: 2rem;
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  align-items: flex-end;
}
.alumno-form label {
  font-family: var(--font-body, "Quicksand", sans-serif);
  font-weight: 700;
  font-size: .88rem;
  color: #444;
  display: flex;
  flex-direction: column;
  gap: .3rem;
  flex: 1 1 200px;
}
.alumno-form input {
  font-family: var(--font-body, "Quicksand", sans-serif);
  font-size: 1rem;
  font-weight: 600;
  padding: .55rem .9rem;
  border: 2px solid #e0dbff;
  border-radius: 12px;
  outline: none;
  color: #333;
  transition: border-color .2s;
  background: #fafafa;
}
.alumno-form input:focus {
  border-color: var(--clr-primary, #6c63ff);
  background: #fff;
}

/* Secciones del cuento */
.cuento-section {
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 4px 18px rgba(108,99,255,.09);
  margin-bottom: 1.6rem;
  overflow: hidden;
  border: 2px solid #ece9ff;
}
.cuento-section-title {
  background: linear-gradient(90deg, #6c63ff 0%, #a78bfa 100%);
  color: #fff;
  font-family: var(--font-title, "Baloo 2", cursive);
  font-size: 1.05rem;
  font-weight: 700;
  padding: .6rem 1.2rem;
  display: flex;
  align-items: center;
  gap: .5rem;
}
.cuento-section-title .section-num {
  background: rgba(255,255,255,.22);
  border-radius: 50%;
  width: 1.8rem;
  height: 1.8rem;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .9rem;
  font-weight: 800;
  flex-shrink: 0;
}

.cuento-columns {
  display: grid;
  grid-template-columns: 1fr 1.4fr;
  gap: 0;
}
.col-imagen {
  padding: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  border-right: 2px solid #ece9ff;
  background: #f8f7ff;
}
.col-imagen img {
  width: 100%;
  max-width: 240px;
  border-radius: 14px;
  box-shadow: 0 3px 12px rgba(108,99,255,.13);
  object-fit: cover;
}
.col-escritura {
  padding: 1rem 1.2rem;
  display: flex;
  flex-direction: column;
  gap: .5rem;
}
.col-escritura label {
  font-family: var(--font-body, "Quicksand", sans-serif);
  font-weight: 700;
  font-size: .82rem;
  color: #888;
  text-transform: uppercase;
  letter-spacing: .06em;
}
.col-escritura textarea {
  font-family: var(--font-body, "Quicksand", sans-serif);
  font-size: 1rem;
  font-weight: 500;
  line-height: 1.7;
  padding: .75rem 1rem;
  border: 2px solid #e0dbff;
  border-radius: 14px;
  resize: none;
  min-height: 130px;
  color: #333;
  background: #fafafa;
  outline: none;
  flex: 1;
  transition: border-color .2s;
}
.col-escritura textarea:focus {
  border-color: var(--clr-primary, #6c63ff);
  background: #fff;
}
.char-count {
  font-size: .75rem;
  color: #bbb;
  text-align: right;
  margin-top: -.3rem;
}

/* Botón enviar */
.enviar-row {
  display: flex;
  justify-content: center;
  gap: 1rem;
  margin-top: .5rem;
  flex-wrap: wrap;
}
.btn-enviar {
  font-family: var(--font-title, "Baloo 2", cursive);
  font-size: 1.1rem;
  font-weight: 700;
  padding: .75rem 2.2rem;
  background: linear-gradient(135deg, #6c63ff 0%, #a78bfa 100%);
  color: #fff;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(108,99,255,.30);
  transition: transform .15s, box-shadow .15s;
  display: flex;
  align-items: center;
  gap: .5rem;
}
.btn-enviar:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 7px 22px rgba(108,99,255,.38);
}
.btn-enviar:disabled {
  opacity: .6;
  cursor: default;
  transform: none;
}

/* Estado de envío */
.estado-envio {
  text-align: center;
  font-family: var(--font-body, "Quicksand", sans-serif);
  font-size: .95rem;
  font-weight: 600;
  min-height: 1.5rem;
  padding: .4rem;
  border-radius: 10px;
  width: 100%;
}
.estado-envio.enviando { color: #6c63ff; }
.estado-envio.ok { color: #22c55e; background: #f0fdf4; padding: .7rem 1rem; border-radius: 14px; }
.estado-envio.error { color: #ef4444; background: #fef2f2; padding: .7rem 1rem; border-radius: 14px; }

/* Confirmación final */
.confirmacion {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  padding: 2.5rem 1rem;
  text-align: center;
}
.confirmacion.visible { display: flex; }
.confirmacion .check-circle {
  font-size: 3.5rem;
  animation: popIn .4s cubic-bezier(.17,.67,.35,1.3) both;
}
@keyframes popIn {
  from { transform: scale(0); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
.confirmacion h2 {
  font-family: var(--font-title, "Baloo 2", cursive);
  font-size: 1.6rem;
  color: var(--clr-primary, #6c63ff);
  margin: 0;
}
.confirmacion p { color: #555; margin: 0; font-size: .95rem; }
.btn-nueva {
  font-family: var(--font-title, "Baloo 2", cursive);
  font-size: 1rem;
  font-weight: 700;
  padding: .65rem 1.8rem;
  background: #f0edff;
  color: #6c63ff;
  border: 2px solid #c4b8ff;
  border-radius: 50px;
  cursor: pointer;
  transition: background .15s;
}
.btn-nueva:hover { background: #e0dbff; }

/* Responsive */
@media (max-width: 560px) {
  .cuento-columns {
    grid-template-columns: 1fr;
  }
  .col-imagen {
    border-right: none;
    border-bottom: 2px solid #ece9ff;
  }
  .col-imagen img { max-width: 200px; }
}
</style>
</head>

    <button class="btn-nueva" onclick="nuevaProduccion()">✏️ Escribir de nuevo</button>

<script>
// ─── CONFIGURACIÓN ───────────────────────────────────────────
// Reemplazá esta URL con la que generó tu Apps Script al publicar
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyo2xAf6oA25W4Eyt5KWGNr9gxHAxXT12QgWCkaoCVV-6tYdKY8ze3tZ6-4xy_fK-6R/exec";
// ─────────────────────────────────────────────────────────────

function updateCount(textarea, counterId) {
  document.getElementById(counterId).textContent = textarea.value.length;
}

function enviarProduccion() {
  const nombre = document.getElementById("inp-nombre").value.trim();
  const grado  = document.getElementById("inp-grado").value.trim();
  const parte1 = document.getElementById("txt1").value.trim();
  const parte2 = document.getElementById("txt2").value.trim();
  const parte3 = document.getElementById("txt3").value.trim();
  const estado = document.getElementById("estadoEnvio");

  // Validaciones
  if (!nombre) { mostrarError("Por favor escribí tu nombre y apellido."); return; }
  if (!grado)  { mostrarError("Por favor escribí tu grado."); return; }
  if (!parte1) { mostrarError("Falta escribir el párrafo del inicio del cuento."); return; }
  if (!parte2) { mostrarError("Falta escribir el párrafo del desarrollo del cuento."); return; }
  if (!parte3) { mostrarError("Falta escribir el párrafo del final del cuento."); return; }

  const btn = document.getElementById("btnEnviar");
  btn.disabled = true;
  estado.className = "estado-envio enviando";
  estado.textContent = "⏳ Enviando tu producción...";

  const payload = { nombre, grado, parte1, parte2, parte3 };

  // Si no hay URL configurada, simulamos éxito para pruebas locales
  if (APPS_SCRIPT_URL === "TU_URL_AQUI") {
    setTimeout(() => mostrarExito(nombre), 900);
    return;
  }

  fetch(APPS_SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  })
  .then(() => mostrarExito(nombre))
  .catch(err => {
    console.error(err);
    mostrarError("Hubo un problema al enviar. Avisale a tu maestra.");
    btn.disabled = false;
  });
}

function mostrarExito(nombre) {
  document.getElementById("formulario").style.display = "none";
  document.getElementById("msg-confirmacion").textContent =
    `¡${nombre}, tu producción fue enviada! La maestra podrá verla en la planilla. 🌟`;
  const conf = document.getElementById("confirmacion");
  conf.classList.add("visible");

  // Confetti
  const emojis = ["⭐","🎉","✨","🌟","🦢"];
  for (let i = 0; i < 22; i++) {
    const p = document.createElement("span");
    p.className = "confetti";
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (2 + Math.random() * 1.5) + "s";
    p.style.fontSize = (1.1 + Math.random() * 1.2) + "rem";
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 3800);
  }
}

function mostrarError(msg) {
  const estado = document.getElementById("estadoEnvio");
  estado.className = "estado-envio error";
  estado.textContent = "⚠️ " + msg;
}

function nuevaProduccion() {
  document.getElementById("inp-nombre").value = "";
  document.getElementById("inp-grado").value = "";
  document.getElementById("txt1").value = "";
  document.getElementById("txt2").value = "";
  document.getElementById("txt3").value = "";
  ["cnt1","cnt2","cnt3"].forEach(id => document.getElementById(id).textContent = "0");
  document.getElementById("estadoEnvio").textContent = "";
  document.getElementById("estadoEnvio").className = "estado-envio";
  document.getElementById("btnEnviar").disabled = false;
  document.getElementById("formulario").style.display = "";
  document.getElementById("confirmacion").classList.remove("visible");
}
</script>
